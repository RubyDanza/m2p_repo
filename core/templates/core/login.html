<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5" style="max-width:520px">
  <h1 class="h4 mb-3">Login</h1>

  {% if form.errors %}
    <div style="padding:10px; background:#ffecec; border:1px solid #f5c2c7; margin-bottom:10px;">
      {{ form.errors }}
    </div>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <input type="hidden" name="next" value="{{ next }}">
    {{ form.as_p }}
    <button class="btn btn-primary">Login</button>
  </form>

  {% if request.GET.next %}
      <p class="mt-3">
        Don’t have an account?
        <a href="{% url 'core:register' %}?next={{ request.GET.next|urlencode }}">
          Register here
        </a>
      </p>
  {% else %}
      <p class="mt-3">
        Don’t have an account?
        <a href="{% url 'core:register' %}">
          Register here
        </a>
      </p>
  {% endif %}

</div>
</body>
</html>
